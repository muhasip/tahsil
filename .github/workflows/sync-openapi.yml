name: Sync User OpenAPI

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run sync:openapi
      - run: npm run ci
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/sync-user-openapi
          delete-branch: true
          commit-message: "docs: sync user OpenAPI"
          title: "docs: sync user OpenAPI"
          body: "Production kullanıcı OpenAPI sözleşmesindeki değişiklikleri Mintlify snapshot'ına taşır."
          labels: documentation,automated

