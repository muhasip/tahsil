      summary: Get canonical payment status
      parameters:
        - $ref: "#/components/parameters/XCompanyIdRequired"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
      x-mint:
        metadata:
          playground: interactive
  /payments/intents/{id}/cancel:
    post:
      operationId: cancelPaymentIntent
      tags:
        - Payments - Orchestration
      summary: Cancel an unsettled payment
      parameters:
        - $ref: "#/components/parameters/XCompanyIdRequired"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
      x-mint:
        metadata:
          playground: simple
  /payments/intents/{id}/refunds:
    post:
      operationId: refundPaymentIntent
      tags:
        - Payments - Orchestration
      summary: Create a full or partial refund
      parameters:
        - $ref: "#/components/parameters/XCompanyIdRequired"
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            maxLength: 128
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amountMinor
              properties:
                amountMinor:
                  type: integer
                  minimum: 1
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
      x-mint:
        metadata:
          playground: simple
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: tahsil_refresh
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    XCompanyId:
      name: x-company-id
      in: header
      required: false
      schema:
        type: string
      description: Target tenant company id. Required for write operations on customer banking endpoints.
    XCompanyIdRequired:
      name: x-company-id
      in: header
      required: true
      schema:
        type: string
      description: Target tenant company id for a write operation.
    XCompanyIds:
      name: x-company-ids
      in: header
      required: false
      schema:
        type: string
      description: Optional comma-separated company ids for read scope filtering. If omitted, all
        authorized companies are used.
    XAuthMode:
      name: x-auth-mode
      in: header
      required: false
      schema:
        type: string
        enum:
          - cookie
      description: Set to cookie for browser sessions. The refresh token is stored in an HttpOnly cookie
        and omitted from JSON.
  responses:
    ErrorResponse:
      description: Request failed
      content:
        application/json:
          schema:
            type: object
            required:
              - status
            properties:
              status:
                type: boolean
                const: false
              error:
                type: object
                additionalProperties: true
          example:
            status: false
            error:
              code: AUTHENTICATION_REQUIRED
              message: Authentication is required
    StatusResponse:
      description: Operation completed
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
          example:
            status: true
    ItemResponse:
      description: Single entity response
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
              result:
                type: object
                additionalProperties: true
          example:
            status: true
            result:
              id: 64f000000000000000000001
    ListResponse:
      description: Paginated list response
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
              result:
                type: array
                items:
                  type: object
                  additionalProperties: true
              paginate:
                type: object
                properties:
                  total:
                    type: integer
                  size:
                    type: integer
                  page:
                    type: integer
                  totalPage:
                    type: integer
          example:
            status: true
            result: []
            paginate:
              total: 0
              size: 25
              page: 1
              totalPage: 0
  schemas:
    PaymentIntentCreate:
      type: object
      required:
        - externalId
        - amountMinor
        - currency
        - returnUrl
      properties:
        externalId:
          type: string
          maxLength: 128
        amountMinor:
          type: integer
          minimum: 1
        currency:
          type: string
          minLength: 3
          maxLength: 3
        returnUrl:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true
      additionalProperties: false
    AccessPolicy:
      type: object
      properties:
        ip:
          $ref: "#/components/schemas/AccessPolicyIp"
        time:
          $ref: "#/components/schemas/AccessPolicyTime"
    AccessPolicyIp:
      type: object
      properties:
        enabled:
          type: boolean
        allowList:
          type: array
          items:
            type: string
            description: IP address or CIDR notation (IPv4/IPv6), e.g. 203.0.113.10 or 203.0.113.0/24
    AccessPolicyTime:
      type: object
      properties:
        enabled:
          type: boolean
        timezone:
          type:
            - string
            - "null"
          example: Europe/Istanbul
        windows:
          type: array
          items:
            $ref: "#/components/schemas/AccessPolicyWindow"
    AccessPolicyWindow:
      type: object
      required:
        - days
        - startTime
        - endTime
      properties:
        days:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 6
          description: Weekday indexes, 0 Sunday ... 6 Saturday
        startTime:
          type: string
          example: 09:00
        endTime:
          type: string
          example: 18:00
    BankProviderCredentialsWrite:
      type: object
      required:
        - credentials
      properties:
        credentials:
          type: object
          writeOnly: true
          minProperties: 1
          maxProperties: 100
          additionalProperties: true
          description: Bank-specific provider credential payload encrypted at rest with AES-256-GCM. New
            clients must send startDate and endDate in BankSyncRequest instead; legacy stored dates
            are used only by manual sync and are ignored by schedules.
    BankSyncRequest:
      type: object
      additionalProperties: false
      example:
        startDate: 2026-07-01
        endDate: 2026-07-15
      properties:
        startDate:
          type: string
          format: date
          pattern: ^\d{4}-\d{2}-\d{2}$
          description: Optional inclusive provider query start date.
        endDate:
          type: string
          format: date
          pattern: ^\d{4}-\d{2}-\d{2}$
          description: Optional inclusive provider query end date; must not precede startDate.
    BankAccountCreate:
      type: object
      required:
        - bankCode
        - title
      example:
        bankCode: akbank
        title: Ana tahsilat hesabı
        environment: production
      properties:
        bankCode:
          type: string
        title:
          type: string
        environment:
          type: string
          enum:
            - demo
            - production
          default: production
          description: Immutable connection mode. Demo connections accept only server-constrained demo
            credentials.
    BankAccountUpdate:
      type: object
      properties:
        title:
          type: string
        status:
          type: boolean
          description: Deactivating a connection pauses its active query schedules. Reactivation resumes only
            schedules paused for that connection.
    TransactionCreate:
      type: object
      required:
        - version
        - providerStamp
        - idNo
        - findAI
        - incoming
        - amount
        - balance
        - bankCode
      example:
        version: "1"
        providerStamp: DEMO-20260715-0001
        idNo: "11111111111"
        findAI: false
        incoming: true
        amount: 1250.5
        balance: 28750.5
        bankCode: demo
      properties:
        accountId:
          type:
            - string
            - "null"
        subAccountKey:
          type:
            - string
            - "null"
        version:
          type: string
        providerStamp:
          type: string
          description: Immutable provider idempotency key, including the bank-specific prefix.
        stamp:
          type: string
          format: date-time
          deprecated: true
          description: Legacy fetch timestamp; use fetchedAt for new records.
        transactionDate:
          type:
            - string
            - "null"
          format: date-time
        fetchedAt:
          type:
            - string
            - "null"
          format: date-time
        idNo:
          type: string
        findAI:
          type: boolean
        incoming:
          type: boolean
        amount:
          type: number
        balance:
          type: number
        bankCode:
          type: string
    TransactionUpdate:
      type: object
      properties:
        transactionDate:
          type:
            - string
            - "null"
          format: date-time
        fetchedAt:
          type:
            - string
            - "null"
          format: date-time
        description:
          type:
            - string
            - "null"
        findAI:
          type: boolean
        status:
          type: boolean
    ExternalReference:
      type: object
      required:
        - source
        - entityType
        - externalId
      properties:
        source:
          type: string
          maxLength: 64
          pattern: ^[a-z0-9][a-z0-9_-]{0,63}$
        entityType:
          type: string
          maxLength: 64
          pattern: ^[a-z0-9][a-z0-9_-]{0,63}$
        externalId:
          type: string
          maxLength: 256
        label:
          type:
            - string
            - "null"
          maxLength: 200
    TransactionRuleCondition:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        field:
          type: string
          enum:
            - bankCode
            - accountId
            - subAccountKey
            - currency
            - incoming
            - amount
            - balance
            - description
            - nameSurname
            - iban
            - idNo
            - code
            - transactionDate
            - fetchedAt
        operator:
          type: string
          enum:
            - equals
            - not_equals
            - contains
            - not_contains
            - starts_with
            - ends_with
            - in
            - exists
            - gt
            - gte
            - lt
            - lte
            - between
        value: {}
    TransactionRuleConditionGroup:
      type: object
      required:
        - combinator
        - children
      properties:
        combinator:
          type: string
          enum:
            - all
            - any
        children:
          type: array
          minItems: 1
          maxItems: 25
          items:
            oneOf:
              - $ref: "#/components/schemas/TransactionRuleCondition"
              - $ref: "#/components/schemas/TransactionRuleConditionGroup"
    TransactionRuleAction:
      oneOf:
        - type: object
          required:
            - type
            - reference
          properties:
            id:
              type: string
              readOnly: true
            type:
              const: attach_reference
            reference:
              $ref: "#/components/schemas/ExternalReference"
        - type: object
          required:
            - type
            - values
          properties:
            id:
              type: string
              readOnly: true
            type:
              const: add_tags
            values:
              type: array
              maxItems: 20
              items:
                type: string
                maxLength: 50
    TransactionRuleCreate:
      type: object
      required:
        - name
        - conditions
        - actions
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type:
            - string
            - "null"
          maxLength: 500
        status:
          type: string
          enum:
            - active
            - paused
        effectiveFrom:
          type: string
          format: date-time
        conditions:
          $ref: "#/components/schemas/TransactionRuleConditionGroup"
        actions:
          type: array
          minItems: 1
          maxItems: 2
          items:
            $ref: "#/components/schemas/TransactionRuleAction"
    TransactionRuleUpdate:
      type: object
      required:
        - version
      minProperties: 2
      properties:
        version:
          type: integer
          minimum: 1
        name:
          type: string
          maxLength: 120
        description:
          type:
            - string
            - "null"
          maxLength: 500
        status:
          type: string
          enum:
            - active
            - paused
        effectiveFrom:
          type: string
          format: date-time
        conditions:
          $ref: "#/components/schemas/TransactionRuleConditionGroup"
        actions:
          type: array
          minItems: 1
          maxItems: 2
          items:
            $ref: "#/components/schemas/TransactionRuleAction"
    RuleVersionRequest:
      type: object
      required:
        - version
      properties:
        version:
          type: integer
          minimum: 1
    TransactionRuleRunScope:
      type: object
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        accountIds:
          type: array
          maxItems: 100
          items:
            type: string
        bankCodes:
          type: array
          maxItems: 100
          items:
            type: string
    TransactionRulePreviewRequest:
      type: object
      properties:
        scope:
          $ref: "#/components/schemas/TransactionRuleRunScope"
    TransactionRuleBackfillRequest:
      type: object
      required:
        - previewRunId
      properties:
        previewRunId:
          type: string
    TransactionAssignmentWrite:
      type: object
      properties:
        reference:
          $ref: "#/components/schemas/ExternalReference"
        tags:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 50
    TransactionAssignmentCreate:
      allOf:
        - $ref: "#/components/schemas/TransactionAssignmentWrite"
        - type: object
          required:
            - reference
    ScheduleWindow:
      type: object
      required:
        - days
        - startTime
        - endTime
        - intervalMinutes
      properties:
        days:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 6
        startTime:
          type: string
          example: 09:00
        endTime:
          type: string
          example: 18:00
        intervalMinutes:
          type: integer
    ScheduleCreate:
      type: object
      required:
        - accountId
      properties:
        accountId:
          type: string
        mode:
          type: string
          enum:
            - interval
            - windowed
        timezone:
          type: string
        intervalMinutes:
          type: integer
        windowRules:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleWindow"
        jitterSeconds:
          type: integer
        nextRunAt:
          type:
            - string
            - "null"
          format: date-time
        status:
          type: boolean
    ScheduleUpdate:
      type: object
      properties:
        mode:
          type: string
          enum:
            - interval
            - windowed
        timezone:
          type: string
        intervalMinutes:
          type: integer
        windowRules:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleWindow"
        jitterSeconds:
          type: integer
        nextRunAt:
          type:
            - string
            - "null"
          format: date-time
        status:
          type: boolean
    DashboardRange:
      type: object
      properties:
        preset:
          type: string
          enum:
            - last_7d
            - last_30d
            - today
            - custom
        from:
          type:
            - string
            - "null"
          format: date-time
        to:
          type:
            - string
            - "null"
          format: date-time
        timezone:
          type:
            - string
            - "null"
    DashboardFilters:
      type: object
      properties:
        bankCode:
          type: array
          items:
            type: string
        currency:
          type: array
          items:
            type: string
        incoming:
          type: boolean
        accountId:
          type: array
          items:
            type: string
        subAccountKey:
          type: array
          items:
            type: string
        amountMin:
          type: number
        amountMax:
          type: number
    DashboardSort:
      type: object
      required:
        - field
        - direction
      properties:
        field:
          type: string
        direction:
          type: string
          enum:
            - asc
            - desc
    DashboardQueryRequest:
      type: object
      required:
        - range
        - metrics
      example:
        range:
          preset: last_30d
          timezone: Europe/Istanbul
        groupBy:
          - currency
        metrics:
          - count
          - sum(amount)
        limit: 20
      properties:
        range:
          $ref: "#/components/schemas/DashboardRange"
        filters:
          $ref: "#/components/schemas/DashboardFilters"
        groupBy:
          type: array
          items:
            type: string
            enum:
              - bankCode
              - subAccountKey
              - currency
              - incoming
              - transactionDate:day
              - transactionDate:week
              - transactionDate:month
              - descriptionBucket
        metrics:
          type: array
          items:
            type: string
            enum:
              - count
              - sum(amount)
              - sum(balance)
              - avg(amount)
              - max(amount)
              - min(amount)
        sort:
          type: array
          items:
            $ref: "#/components/schemas/DashboardSort"
        limit:
          type: integer
          minimum: 1
          maximum: 500
    AuthLoginRequest:
      type: object
      required:
        - email
        - password
      example:
        email: developer@example.com
        password: example-password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        companyId:
          type:
            - string
            - "null"
    AuthRefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
        companyId:
          type:
            - string
            - "null"
    AuthLogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
    AuthProfileUpdateRequest:
      type: object
      minProperties: 1
      properties:
        fullName:
          type: string
        phone:
          type:
            - string
            - "null"
        accessPolicy:
          $ref: "#/components/schemas/AccessPolicy"
    AuthChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 10
