openapi: 3.1.0
info:
  title: Tahsil API
  version: 1.0.0
  description: Tahsil müşterilerinin web ve mobil uygulamalarda kullandığı tenant-scoped müşteri API sözleşmesi.
servers:
  - url: https://api.tahsil.dev
    description: Production
security:
  - bearerAuth: []
tags:
  - name: Operations - Health
    description: Public liveness and dependency readiness probes.
  - name: Identity - Auth
    description: User login, refresh and logout flows for token-based access.
  - name: Banking - Accounts
    description: Bank account aggregation endpoints available to customer tenants.
  - name: Banking - Transactions
    description: Bank transaction ingestion and retrieval endpoints.
  - name: Banking - Automation
    description: Tenant transaction matching rules, assignments and historical runs.
  - name: Banking - Polling
    description: Polling schedule definitions for bank connector queries.
  - name: Banking - Dashboard
    description: Flexible tenant dashboard analytics and widget query endpoints.
  - name: Audit - Connector Logs
    description: Customer-visible bank connector request/response audit trail.
  - name: Payments - Orchestration
    description: Tenant Virtual POS, rate plan and payment intent orchestration.
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - Operations - Health
      summary: Process liveness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: interactive
  /ready:
    get:
      operationId: getReady
      tags:
        - Operations - Health
      summary: Dependency readiness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        "503":
          $ref: "#/components/responses/StatusResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: interactive
  /banks/usage:
    get:
      operationId: getBanksUsage
      tags:
        - Banking - Accounts
      summary: Return tenant subscription usage and remaining limits
      description: Requires x-company-id. Optional bankCode adds the bank-specific transaction metric.
      parameters:
        - name: x-company-id
          in: header
          required: true
          schema:
            type: string
        - name: bankCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        "402":
          $ref: "#/components/responses/StatusResponse"
        "503":
          $ref: "#/components/responses/StatusResponse"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
  /banks/accounts:
    get:
      operationId: getBanksAccounts
      tags:
        - Banking - Accounts
      summary: List bank connections with provider-owned sub-accounts
      responses:
        "200":
          $ref: "#/components/responses/ListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      description: Default read scope includes all authorized companies when no company header is provided.
      parameters:
        - $ref: "#/components/parameters/XCompanyId"
        - $ref: "#/components/parameters/XCompanyIds"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
    post:
      operationId: postBanksAccounts
      tags:
        - Banking - Accounts
      summary: Register a bank connection for the tenant
      description: A tenant can register multiple independent connections for the same bank. Currency and
        physical accounts are discovered by provider setup and returned as subAccounts. Demo and
        production connections keep separate credential modes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankAccountCreate"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        "402":
          $ref: "#/components/responses/StatusResponse"
        "409":
          $ref: "#/components/responses/StatusResponse"
      parameters:
        - name: x-company-id
          in: header
          required: true
          schema:
            type: string
          description: Target tenant company id for write operation.
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: simple
  /banks/accounts/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      operationId: getBanksAccountsById
      tags:
        - Banking - Accounts
      summary: Bank account connector detail
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      description: Default read scope includes all authorized companies when no company header is provided.
      parameters:
        - $ref: "#/components/parameters/XCompanyId"
        - $ref: "#/components/parameters/XCompanyIds"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
    put:
      operationId: putBanksAccountsById
      tags:
        - Banking - Accounts
      summary: Update bank account connector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankAccountUpdate"
      responses:
        "200":
          $ref: "#/components/responses/StatusResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      parameters:
        - name: x-company-id
          in: header
          required: true
          schema:
            type: string
          description: Target tenant company id for write operation.
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: simple
    delete:
      operationId: deleteBanksAccountsById
      tags:
        - Banking - Accounts
      summary: Remove bank account connector
      description: Removes the connection, encrypted credential and query schedule. Previously ingested
        transactions and retained provider audit logs remain available as financial history.
      responses:
        "200":
          $ref: "#/components/responses/StatusResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      parameters:
        - name: x-company-id
          in: header
          required: true
          schema:
            type: string
          description: Target tenant company id for write operation.
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: simple
  /banks/provider/variables:
    get:
      operationId: getBanksProviderVariables
      tags:
        - Banking - Accounts
      summary: List normalized provider connection field metadata
      description: Returns field definitions only; provider credential values are never returned. Date
        fields are transaction query controls, not stored credentials.
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ListResponse"
        "403":
          $ref: "#/components/responses/StatusResponse"
        "502":
          $ref: "#/components/responses/StatusResponse"
      x-mint:
        metadata:
          playground: interactive
  /banks/provider/variables/{bankCode}:
    parameters:
      - name: bankCode
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getBanksProviderVariablesByBankCode
      tags:
        - Banking - Accounts
      summary: Read normalized provider connection field metadata for a bank
      description: Requires a tenant admin or operator Bearer token and proxies metadata through Core
        without exposing the provider envelope.
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        "400":
          $ref: "#/components/responses/StatusResponse"
        "403":
          $ref: "#/components/responses/StatusResponse"
        "404":
          $ref: "#/components/responses/StatusResponse"
        "502":
          $ref: "#/components/responses/StatusResponse"
      x-mint:
        metadata:
          playground: interactive
  /banks/accounts/{id}/credentials:
    parameters:
      - $ref: "#/components/parameters/Id"
      - name: x-company-id
        in: header
        required: true
        schema:
          type: string
        description: Target tenant company id for the provider connection.
    get:
      operationId: getBanksAccountsByIdCredentials
      tags:
        - Banking - Accounts
      summary: Read encrypted provider credential status
      description: Returns encryption metadata only; provider secrets are never returned.
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: interactive
    put:
      operationId: putBanksAccountsByIdCredentials
      tags:
        - Banking - Accounts
      summary: Store or rotate encrypted provider credentials
      description: Requires a tenant admin or operator Bearer token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankProviderCredentialsWrite"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: simple
    delete:
      operationId: deleteBanksAccountsByIdCredentials
      tags:
        - Banking - Accounts
      summary: Remove encrypted provider credentials
      description: Requires a tenant admin or operator Bearer token.
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: simple
  /banks/accounts/{id}/health:
    parameters:
      - $ref: "#/components/parameters/Id"
      - name: x-company-id
        in: header
        required: true
        schema:
          type: string
    get:
      operationId: getBanksAccountsByIdHealth
      tags:
        - Banking - Accounts
      summary: Return sanitized connector setup, sync, schedule and last-attempt health
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
  /banks/accounts/{id}/setup:
    parameters:
      - $ref: "#/components/parameters/Id"
      - name: x-company-id
        in: header
        required: true
        schema:
          type: string
        description: Target tenant company id for the provider connection.
    post:
      operationId: postBanksAccountsByIdSetup
      tags:
        - Banking - Accounts
      summary: Discover and persist provider sub-accounts
      description: Decrypts credentials only in memory and records a redacted provider audit event.
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        "409":
          $ref: "#/components/responses/StatusResponse"
        "502":
          $ref: "#/components/responses/StatusResponse"
      x-mint:
        metadata:
          playground: simple
  /banks/accounts/{id}/sync:
    parameters:
      - $ref: "#/components/parameters/Id"
      - name: x-company-id
        in: header
        required: true
        schema:
          type: string
        description: Target tenant company id for the provider connection.
    post:
      operationId: postBanksAccountsByIdSync
      tags:
        - Banking - Accounts
      summary: Run an idempotent manual provider transaction sync
      description: Requires a tenant admin or operator Bearer token and deduplicates by tenant, bank and
        provider stamp.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankSyncRequest"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        "402":
          $ref: "#/components/responses/StatusResponse"
        "409":
          $ref: "#/components/responses/StatusResponse"
        "422":
          $ref: "#/components/responses/StatusResponse"
        "502":
          $ref: "#/components/responses/StatusResponse"
      x-mint:
        metadata:
          playground: simple
  /banks/transactions/export:
    get:
      operationId: getBanksTransactionsExport
      tags:
        - Banking - Transactions
      summary: Export the filtered tenant transaction set as CSV
      description: Uses the same allowlisted filters as the list endpoint and applies a configured row cap.
      parameters:
        - $ref: "#/components/parameters/XCompanyId"
        - $ref: "#/components/parameters/XCompanyIds"
        - name: bankCode
          in: query
          schema:
            type: string
        - name: currency
          in: query
          schema:
            type: string
        - name: subAccountKey
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: UTF-8 CSV export
          content:
            text/csv:
              schema:
                type: string
        "413":
          $ref: "#/components/responses/StatusResponse"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
  /banks/transactions:
    get:
      operationId: getBanksTransactions
      tags:
        - Banking - Transactions
      summary: List ingested bank transactions
      responses:
        "200":
          $ref: "#/components/responses/ListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      description: Default read scope includes all authorized companies when no company header is provided.
      parameters:
        - $ref: "#/components/parameters/XCompanyId"
        - $ref: "#/components/parameters/XCompanyIds"
        - name: pagination
          in: query
          schema:
            type: string
            enum:
              - offset
              - cursor
        - name: cursor
          in: query
          schema:
            type: string
        - name: pageSize
          in: query
          description: Offset mode supports up to 250; cursor mode supports up to 100.
          schema:
            type: integer
            minimum: 1
            maximum: 250
        - name: bankCode
          in: query
          description: Single bank code or comma-separated allowlist.
          schema:
            type: string
        - name: currency
          in: query
          schema:
            type: string
        - name: subAccountKey
          in: query
          schema:
            type: string
        - name: incoming
          in: query
          schema:
            type: boolean
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          schema:
            type: string
            maxLength: 100
        - name: referenceSource
          in: query
          schema:
            type: string
        - name: referenceType
          in: query
          schema:
            type: string
        - name: referenceId
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: includeAssignments
          in: query
          schema:
            type: boolean
        - name: automationStatus
          in: query
          schema:
            type: string
            enum:
              - legacy
              - pending
              - processing
              - retry
              - completed
              - dead
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - transactionDate
              - fetchedAt
              - amount
              - balance
        - name: direction
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
    post:
      operationId: postBanksTransactions
      tags:
        - Banking - Transactions
      summary: Ingest bank transaction record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionCreate"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        "402":
          $ref: "#/components/responses/StatusResponse"
      parameters:
        - name: x-company-id
          in: header
          required: true
          schema:
            type: string
          description: Target tenant company id for write operation.
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: simple
  /banks/transactions/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      operationId: getBanksTransactionsById
      tags:
        - Banking - Transactions
      summary: Transaction detail
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      description: Default read scope includes all authorized companies when no company header is provided.
      parameters:
        - $ref: "#/components/parameters/XCompanyId"
        - $ref: "#/components/parameters/XCompanyIds"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
    put:
      operationId: putBanksTransactionsById
      tags:
        - Banking - Transactions
      summary: Update transaction metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdate"
      responses:
        "200":
          $ref: "#/components/responses/StatusResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      parameters:
        - name: x-company-id
          in: header
          required: true
          schema:
            type: string
          description: Target tenant company id for write operation.
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: simple
    delete:
      operationId: deleteBanksTransactionsById
      tags:
        - Banking - Transactions
      summary: Delete transaction record
      responses:
        "200":
          $ref: "#/components/responses/StatusResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      parameters:
        - name: x-company-id
          in: header
          required: true
          schema:
            type: string
          description: Target tenant company id for write operation.
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: simple
  /banks/transaction-rules:
    get:
      operationId: getBanksTransactionRules
      tags:
        - Banking - Automation
      summary: List tenant transaction rules
      parameters:
        - $ref: "#/components/parameters/XCompanyId"
        - $ref: "#/components/parameters/XCompanyIds"
      responses:
        "200":
          $ref: "#/components/responses/ListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
    post:
      operationId: postBanksTransactionRules
      tags:
        - Banking - Automation
      summary: Create a transaction rule
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCompanyIdRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRuleCreate"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: simple
  /banks/transaction-rules/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      operationId: getBanksTransactionRulesById
      tags:
        - Banking - Automation
      summary: Get transaction rule detail
      parameters:
        - $ref: "#/components/parameters/XCompanyId"
        - $ref: "#/components/parameters/XCompanyIds"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
    put:
      operationId: putBanksTransactionRulesById
      tags:
        - Banking - Automation
      summary: Update a rule using optimistic version locking
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCompanyIdRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRuleUpdate"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        "409":
          $ref: "#/components/responses/StatusResponse"
      x-mint:
        metadata:
          playground: simple
    delete:
      operationId: deleteBanksTransactionRulesById
      tags:
        - Banking - Automation
      summary: Archive a rule without changing existing assignments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XCompanyIdRequired"
        - name: version
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: simple
  /banks/transaction-rules/{id}/pause:
    patch:
      operationId: patchBanksTransactionRulesByIdPause
      tags:
        - Banking - Automation
      summary: Pause future rule evaluation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/XCompanyIdRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleVersionRequest"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: simple
  /banks/transaction-rules/{id}/resume:
    patch:
      operationId: patchBanksTransactionRulesByIdResume
      tags:
        - Banking - Automation
      summary: Resume future rule evaluation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/XCompanyIdRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleVersionRequest"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: simple
  /banks/transaction-rules/{id}/preview-runs:
    post:
      operationId: postBanksTransactionRulesByIdPreviewRuns
      tags:
        - Banking - Automation
      summary: Queue a read-only historical rule preview
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/XCompanyIdRequired"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRulePreviewRequest"
      responses:
        "202":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
        metadata:
          playground: simple
  /banks/transaction-rules/{id}/backfill-runs:
    post:
      operationId: postBanksTransactionRulesByIdBackfillRuns
      tags:
        - Banking - Automation
      summary: Queue a backfill from a completed current preview
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/XCompanyIdRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRuleBackfillRequest"
      responses:
        "202":
          $ref: "#/components/responses/ItemResponse"
        "409":
          $ref: "#/components/responses/StatusResponse"
      x-mint:
        metadata:
          playground: simple
  /banks/transaction-rule-runs:
    get:
      operationId: getBanksTransactionRuleRuns
      tags:
        - Banking - Automation
      summary: List preview and backfill runs
      parameters:
        - $ref: "#/components/parameters/XCompanyId"
        - $ref: "#/components/parameters/XCompanyIds"
      responses:
        "200":
          $ref: "#/components/responses/ListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
  /banks/transaction-rule-runs/{id}:
    get:
      operationId: getBanksTransactionRuleRunsById
      tags:
        - Banking - Automation
      summary: Get rule run progress
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/XCompanyId"
        - $ref: "#/components/parameters/XCompanyIds"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      security:
        - bearerAuth: []
      x-mint:
        metadata:
          playground: interactive
  /banks/transaction-rule-runs/{id}/retry:
    post:
      operationId: postBanksTransactionRuleRunsByIdRetry
      tags:
        - Banking - Automation
      summary: Retry a failed rule run
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/XCompanyIdRequired"
      responses:
        "200":
          $ref: "#/components/responses/ItemResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
      x-mint:
